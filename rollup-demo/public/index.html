<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HLS WASM Player (Rollup)</title>
        <link rel="stylesheet" href="/styles.css" />
        <script src="./wasm/decoder.js"></script>
    </head>
    <body>
        <div class="app-shell">
            <header class="topbar">
                <h1>HLS WASM Player (Rollup)</h1>
                <p>
                    TS/fMP4 Soft Decode · WebGL + AudioContext · Live/VOD/LL-HLS
                </p>
            </header>

            <main class="player-layout">
                <section class="video-panel">
                    <canvas id="videoCanvas" width="1280" height="720"></canvas>
                    <div class="progress-row">
                        <span id="progressLabel" class="progress-label"
                            >0:00 / 0:00</span
                        >
                        <input
                            type="range"
                            id="progressBar"
                            class="progress-bar"
                            min="0"
                            max="100"
                            value="0"
                            step="0.1"
                        />
                    </div>
                    <div class="control-row">
                        <button id="playBtn" type="button">Play</button>
                        <button id="pauseBtn" type="button">Pause</button>
                        <button id="loadBtn" type="button">Reload</button>

                        <label class="ctrl-inline">
                            <input id="muteToggle" type="checkbox" />
                            <span>Mute</span>
                        </label>

                        <label class="ctrl-inline">
                            <span>Vol</span>
                            <input
                                id="volumeBar"
                                type="range"
                                min="0"
                                max="100"
                                value="100"
                                step="1"
                            />
                            <span id="volumeLabel" class="value-label">100%</span>
                        </label>

                        <label class="ctrl-inline">
                            <span>Rate</span>
                            <select id="rateSelect">
                                <option value="0.5">0.5x</option>
                                <option value="0.75">0.75x</option>
                                <option value="1" selected>1x</option>
                                <option value="1.25">1.25x</option>
                                <option value="1.5">1.5x</option>
                                <option value="2">2x</option>
                            </select>
                        </label>
                    </div>
                    <div class="status-row">
                        <span class="status-pill"
                            >state:
                            <strong id="stateLabel">idle</strong></span
                        >
                        <span class="status-pill"
                            >buffered:
                            <strong id="bufferedLabel">0.0s</strong></span
                        >
                        <span class="status-pill"
                            >ended:
                            <strong id="endedLabel">false</strong></span
                        >
                    </div>
                </section>

                <aside class="control-panel">
                    <label for="urlInput">M3U8 URL</label>
                    <input
                        id="urlInput"
                        type="text"
                        value="http://localhost:5000/h264_10s_fmp4/output_h264_fmp4.m3u8"
                        placeholder="https://example.com/live.m3u8"
                    />

                    <label for="modeSelect">Play Mode</label>
                    <select id="modeSelect">
                        <option value="vod" selected>VOD</option>
                        <option value="live">Live</option>
                    </select>

                    <div class="button-row">
                        <button id="startBtn">Start</button>
                        <button id="stopBtn">Stop</button>
                    </div>

                    <details class="event-panel" open>
                        <summary>Events</summary>
                        <pre id="eventBox" class="event-box"></pre>
                    </details>

                    <pre id="logBox" class="log-box"></pre>
                </aside>
            </main>
        </div>

        <script src="/index.umd.js"></script>
        <script src="/demo.js"></script>
    </body>
</html>
